# 9-node benchmark network used throughout the experiments.
# Hand-tuned node parameters chosen so every node has a distinct fault
# signature in the chosen frequency band; do not edit without re-running
# the validation experiments.

preset: benchmark_9node
edge_weight: 1.0
injection_nodes: [0]                     # N1 only
observation_nodes: [1, 2, 3, 4, 5, 6, 7, 8]  # N2..N9
