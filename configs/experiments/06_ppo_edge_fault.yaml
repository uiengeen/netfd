# Experiment 06: Pair-switching PPO for EDGE (topology) faults
# ============================================================
# Main result 2. Same action space as exp 05, but the hypothesis set is
# now 11 edge faults instead of node faults.

network_config: ../networks/benchmark_9node.yaml

hypotheses:
  kind: edge
  new_weight: 5.0
  # edges: null   # null = use all 11 benchmark edges
  edges: null

pair_list:
  injection: 0
  observations: [1, 2, 3, 4, 5, 6, 7, 8]

omega_grid:
  low: -2
  high: 2
  num: 801

probing:
  top_k_peaks: 3
  peak_prominence: 1.0e-4
  peak_relative_thresh: 0.05
  inv_detect_floor: 0.05
  duration: 4.0
  dt: 0.01
  amp: 1.0

noise:
  snr_db_train_range: [-15.0, 10.0]
  snr_db_eval: [40.0, 10.0, 0.0, -10.0]
  n_mc_eval: 200

reward:
  K_max: 12                       # slightly longer episodes
  belief_threshold: 0.9
  alpha_info: 1.0
  beta_amb: 0.5
  step_cost: 0.05
  R_succ: 5.0
  R_fail: -5.0

ppo:
  total_timesteps: 300000         # more hypotheses -> bigger budget
  num_envs: 8
  num_steps: 64
  learning_rate: 3.0e-4
  ent_coef: 0.02
  hidden: 192                     # slightly wider for larger H
  seed: 1

outdir: outputs/06_ppo_edge_fault
