# Experiment 05: Pair-switching PPO for NODE faults
# =================================================
# Main result 1. PPO with a single-channel observation per step matches
# the single-shot baseline that observes ALL nodes simultaneously.
#
# Action space: 8 (injection, observation) pairs (N1 -> N2..N9).

network_config: ../networks/benchmark_9node.yaml

hypotheses:
  kind: node
  fault_type: stiffness
  severity: 0.8
  node_indices: null            # null = all 9 nodes

# Action set: one I/O pair per action
pair_list:
  injection: 0                  # N1
  observations: [1, 2, 3, 4, 5, 6, 7, 8]  # N2..N9

omega_grid:
  low: -2
  high: 2
  num: 801

probing:
  top_k_peaks: 3
  peak_prominence: 1.0e-4
  peak_relative_thresh: 0.05
  inv_detect_floor: 0.05
  duration: 4.0
  dt: 0.01
  amp: 1.0

noise:
  snr_db_train_range: [-15.0, 10.0]
  snr_db_eval: [40.0, 10.0, 0.0, -10.0]
  n_mc_eval: 200

reward:
  K_max: 10
  belief_threshold: 0.9
  alpha_info: 1.0
  beta_amb: 0.5
  step_cost: 0.05
  R_succ: 5.0
  R_fail: -5.0

ppo:
  total_timesteps: 200000
  num_envs: 8
  num_steps: 64
  learning_rate: 3.0e-4
  ent_coef: 0.02
  hidden: 128
  seed: 1

outdir: outputs/05_ppo_node_fault
